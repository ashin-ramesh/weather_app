<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
            padding-top: 100px;
        }
        input {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px;
            border: none;
            background: #38bdf8;
            color: black;
            border-radius: 5px;
            cursor: pointer;
        }
        .box {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🌦 Weather App</h1>

    <form action="/location" method="POST">
        <input type="text" name="city" placeholder="Enter city name">
        <button type="submit">Search</button>
    </form>

    <div class="box">
        {% if weather %}
            <h2>{{ weather.city }}</h2>
            <p>🌡 Temperature: {{ weather.temperature }} °C</p>
            <p>☁ Weather: {{ weather.description }}</p>
            <p>💧 Humidity: {{ weather.humidity }}%</p>
        {% endif %}

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}
    </div>

</body>
</html>
